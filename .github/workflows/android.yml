name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Restore stable signing key
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: tvoice-stable-debug-keystore-v1

      - name: Create signing key when missing
        run: |
          mkdir -p ~/.android
          if [ ! -f ~/.android/debug.keystore ]; then
            keytool -genkeypair -v \
              -keystore ~/.android/debug.keystore \
              -storepass android \
              -alias androiddebugkey \
              -keypass android \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Tvoice Development,O=Tvoice,C=TJ"
          fi

      - name: Build debug APK
        run: gradle :app:assembleDebug --stacktrace

      - uses: actions/upload-artifact@v4
        with:
          name: Tvoice-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
