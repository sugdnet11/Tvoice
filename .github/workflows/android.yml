name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'
      - name: Restore permanent Tvoice signing key
        env:
          TVOICE_KEYSTORE_BASE64: ${{ secrets.TVOICE_KEYSTORE_BASE64 }}
          TVOICE_KEYSTORE_PASSWORD: ${{ secrets.TVOICE_KEYSTORE_PASSWORD }}
        run: |
          if [ -z "$TVOICE_KEYSTORE_BASE64" ] || [ -z "$TVOICE_KEYSTORE_PASSWORD" ]; then
            echo "::error::Tvoice signing secrets are missing"
            exit 1
          fi
          printf '%s' "$TVOICE_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/tvoice-release.jks"
      - name: Build debug APK
        env:
          TVOICE_SIGNING_STORE_FILE: ${{ runner.temp }}/tvoice-release.jks
          TVOICE_SIGNING_STORE_PASSWORD: ${{ secrets.TVOICE_KEYSTORE_PASSWORD }}
          TVOICE_SIGNING_KEY_ALIAS: tvoice
          TVOICE_SIGNING_KEY_PASSWORD: ${{ secrets.TVOICE_KEYSTORE_PASSWORD }}
        run: gradle :app:assembleDebug --stacktrace
      - uses: actions/upload-artifact@v4
        with:
          name: Tvoice-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
